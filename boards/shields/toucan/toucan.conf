# Shared user config for both halves. config/toucan_left.conf and
# config/toucan_right.conf both symlink here (they were dangling until this
# file existed).
#
# urob's ported keymap stacks up to 6 combos on a single key position (RM2:
# lpar/rpar/lt/gt/star/fslh), which exceeds ZMK's default per-key combo limit.
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=6

# Prospector scanner-mode status broadcasting (t-ogura prospector-zmk-module,
# pinned in config/west.yml). Lets the Prospector dongle passively display the
# toucan's active layer + battery without pairing. The broadcast originates from
# the central half, which on the toucan is the LEFT (see Kconfig.defconfig:
# SHIELD_TOUCAN_LEFT -> ZMK_SPLIT_ROLE_CENTRAL). KEYBOARD_NAME matches the
# stock ZMK_KEYBOARD_NAME so the dongle labels it "Toucan".
CONFIG_ZMK_STATUS_ADVERTISEMENT=y
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="Toucan"
CONFIG_ZMK_STATUS_ADV_CENTRAL_SIDE="LEFT"
