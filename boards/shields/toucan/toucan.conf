# Shared user config for both halves. config/toucan_left.conf and
# config/toucan_right.conf both symlink here (they were dangling until this
# file existed).
#
# urob's ported keymap stacks up to 6 combos on a single key position (RM2:
# lpar/rpar/lt/gt/star/fslh), which exceeds ZMK's default per-key combo limit.
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=6
